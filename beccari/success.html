<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Richiesta ricevuta — Travelli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080a;color:#fff;font-family:'Helvetica Neue',Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px}
.box{text-align:center;max-width:480px}
.t-box{width:48px;height:48px;background:#c8a96e;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:24px;font-weight:700;color:#08080a;font-family:Georgia,serif}
h1{font-family:Georgia,serif;font-size:32px;font-weight:300;font-style:italic;color:#fff;margin-bottom:12px}
p{font-size:15px;color:rgba(255,255,255,.65);line-height:1.7;margin-bottom:32px}
a{display:inline-block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#c8a96e;border:1px solid #8a7049;padding:13px 28px;text-decoration:none;transition:border-color .2s}
a:hover{border-color:#c8a96e}
</style>
</head>
<body>
<div class="box">
  <div class="t-box">T</div>
  <h1>Richiesta ricevuta</h1>
  <p>Il team Travelli la contatterà entro 1 giorno lavorativo con il dossier e i dettagli per la visita privata.</p>
  <a href="/">← Torna alle residenze</a>
</div>
</body>
</html>
